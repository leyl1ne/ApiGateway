# API Gateway Configuration
# =========================

server:
  http:
    port: 8080
    read_timeout: 10s
    write_timeout: 30s
    idle_timeout: 60s

    basic_auth:
      enabled: true
      username: "BASIC_AUTH_USER"   # ← placeholder
      password: "BASIC_AUTH_PASS"   # ← placeholder

  graceful_shutdown: 15s

cors:
  # Origins, с которых разрешены запросы из браузера.
  # Для разработки укажите URL SPA, для продакшена — реальный домен.
  # Используйте ["*"] чтобы разрешить все origins (НЕ рекомендуется для продакшена).
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
  exposed_headers:
    - Content-Length
  allow_credentials: true
  max_age: 43200  # 12 часов в секундах

jwt:
  # Должен совпадать с секретом, используемым в UserService для подписи JWT.
  secret: "your-super-secret-key-change-me"
  access_token_ttl: 24h

logger:
  level: info        # debug | info | warn | error | fatal | panic
  format: console    # json | console
  output: stderr     # stderr | stdout | /var/log/gateway/app.log

services:
  user_service:
    # URL UserService, на который gateway проксирует запросы.
    url: "http://localhost:8081"
